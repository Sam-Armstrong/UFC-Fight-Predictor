name: Update fight data

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-fight-data
  cancel-in-progress: false

jobs:
  scrape-fights:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install scraper dependencies
        run: |
          pip install beautifulsoup4 lxml pandas playwright tqdm

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Scrape new fight results and stats
        run: python -c "from scraper import scrape_past_fights; scrape_past_fights(start_date='1/1/2010')"

      - name: Commit and push changes
        run: |
          git config user.name "Sam-Armstrong"
          git config user.email "samuel_e_armstrong@yahoo.co.uk"
          git add data/FightResults.csv data/FightStats.csv

          if git diff --staged --quiet; then
            echo "No fight data changes to commit."
          else
            git commit -m "chore: update fight results and stats"
            git push
          fi
